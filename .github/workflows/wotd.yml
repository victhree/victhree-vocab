name: Vocabulary of the Day

on:
  schedule:
    # Several attempts through the morning (IST). The script no-ops once the day
    # is already done, so whichever attempt first gets a runner refreshes the words.
    - cron: '30 1 * * *'    # 07:00 IST
    - cron: '30 2 * * *'    # 08:00 IST
    - cron: '30 4 * * *'    # 10:00 IST
    - cron: '30 7 * * *'    # 13:00 IST
  workflow_dispatch:        # allow manual runs from the Actions tab

permissions:
  contents: write

concurrency:
  group: wotd
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate today's vocabulary
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          FORCE: ${{ github.event_name == 'workflow_dispatch' }}
        run: node .github/scripts/wotd.mjs

      - name: Commit if changed
        run: |
          git config user.name  "VicThree WOTD bot"
          git config user.email "actions@users.noreply.github.com"
          if ! git diff --quiet -- docs/data/wotd.json; then
            git add docs/data/wotd.json
            git commit -m "Vocabulary of the Day: $(date -u +%Y-%m-%d)"
            git push
          else
            echo "No change to wotd.json — nothing to commit."
          fi
