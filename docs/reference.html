<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Word Toolkit — VicThree Vocab</title>
<meta name="theme-color" content="#0B1F3A">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="assets/icon-180.png">
<link rel="icon" href="assets/icon-192.png">
<link rel="stylesheet" href="css/styles.css?v=25">
</head>
<body>
<header class="vbanner">
  <a href="index.html"><img class="bimg" src="assets/banner.png?v=25" alt="VicThree Defence"></a>
  <nav class="vbanner-icons">
    <a href="index.html" title="Home" aria-label="Home"><svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11l9-8 9 8"/><path d="M5 10v10h14V10"/></svg></a>
    <a href="browse.html?saved=1" title="Saved words" aria-label="Saved"><svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor"><path d="M12 2.5l2.9 6 6.6.5-5 4.3 1.5 6.4L12 16.9 5.5 20.2 7 13.8 2 9.5l6.6-.5z"/></svg></a>
  </nav>
</header>

<main class="container">
  <h2 style="margin:4px 0 12px">Word Toolkit</h2>

  <div class="chips" id="tabs" style="margin-bottom:10px">
    <button class="chip" data-tab="roots">🌱 Roots &amp; affixes</button>
    <button class="chip" data-tab="clusters">🕸️ Synonym clusters</button>
    <button class="chip" data-tab="confusables">⚠️ Confusable pairs</button>
  </div>

  <p id="intro" class="muted-intro"></p>

  <div class="chips" id="rootkinds" style="margin-bottom:12px">
    <button class="chip on" data-k="all">All</button>
    <button class="chip" data-k="root">Roots</button>
    <button class="chip" data-k="prefix">Prefixes</button>
    <button class="chip" data-k="suffix">Suffixes</button>
  </div>

  <div class="toolbar" style="grid-template-columns:1fr">
    <div class="field"><label for="search">Search</label>
      <input id="search" type="search" placeholder="root, word, meaning…"></div>
  </div>

  <div class="cards" id="list"><div class="spin">Loading toolkit…</div></div>
  <p class="foot">From the CDS vocabulary field manual — Roots (Strategy 8), Synonym Clusters (Strategy 1), Confusables (Strategy 6). Tap a highlighted cluster word to open its full card.</p>
</main>

<div class="modal" id="modal" hidden><div class="modal-card" id="modal-card"></div></div>

<script src="js/data.js?v=25"></script>
<script src="js/reference.js?v=25"></script>
</body>
</html>
