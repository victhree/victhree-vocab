<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Quiz — VicThree Vocab</title>
<meta name="theme-color" content="#0B1F3A">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="assets/shield-180.png?v=45">
<link rel="icon" href="assets/shield-192.png?v=45"><link rel="icon" sizes="32x32" href="assets/shield-32.png?v=45">
<link rel="stylesheet" href="css/styles.css?v=45">
</head>
<body>
<header class="vbanner">
  <a href="index.html"><img class="bimg" src="assets/banner.png?v=45" alt="VicThree Defence"></a>
  <nav class="vbanner-icons">
    <a href="index.html" title="Home" aria-label="Home"><svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11l9-8 9 8"/><path d="M5 10v10h14V10"/></svg></a>
    <a href="browse.html?saved=1" title="Saved words" aria-label="Saved"><svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor"><path d="M12 2.5l2.9 6 6.6.5-5 4.3 1.5 6.4L12 16.9 5.5 20.2 7 13.8 2 9.5l6.6-.5z"/></svg></a>
  </nav>
  <div class="hud-bar"><span class="dot"></span> System Online <span class="sep">&middot;</span> <span class="amber">TARGET:</span> CDS <span class="amber">//</span> AFCAT English <span class="sep">&middot;</span> Ready</div>
</header>

<main class="container">
  <h2 id="qtitle" style="margin:4px 0 12px">Quiz</h2>

  <div class="toolbar">
    <div class="field">
      <label for="count">Questions</label>
      <select id="count">
        <option value="20">20</option>
        <option value="50" selected>50</option>
        <option value="100">100</option>
        <option value="0">All</option>
      </select>
    </div>
    <div class="field" style="justify-content:flex-end">
      <label>&nbsp;</label>
      <button class="btn outline" id="reshuffle">🔀 New set</button>
    </div>
  </div>

  <div class="scorebar" id="bar">
    <span id="prog">0 / 0 answered</span>
    <button class="btn" id="submit" style="margin-left:auto">Submit test</button>
  </div>

  <div id="result"></div>
  <div class="cards" id="stage"><div class="spin">Loading quiz…</div></div>
  <p class="foot">Answer as many as you like — you can skip any question. Press <b>Submit test</b> anytime to see your score and the correct answers.</p>
</main>

<script src="js/data.js?v=45"></script>
<script src="js/quiz.js?v=45"></script>
</body>
</html>
