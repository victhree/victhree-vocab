<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Quiz — VicThree Vocab</title>
<meta name="theme-color" content="#0B1F3A">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="assets/icon-180.png">
<link rel="icon" href="assets/icon-192.png">
<link rel="stylesheet" href="css/styles.css?v=11">
</head>
<body>
<header class="vbanner">
  <a href="index.html"><img class="bimg" src="assets/banner.png?v=11" alt="VicThree Defence"></a>
  <nav class="vbanner-nav">
    <a href="index.html">🏠 Home</a>
    <a href="browse.html?saved=1">⭐ Saved</a>
  </nav>
</header>

<main class="container">
  <h2 id="qtitle" style="margin:4px 0 12px">Quiz</h2>

  <div class="toolbar">
    <div class="field">
      <label for="count">Questions</label>
      <select id="count">
        <option value="20">20</option>
        <option value="50" selected>50</option>
        <option value="100">100</option>
        <option value="0">All</option>
      </select>
    </div>
    <div class="field" style="justify-content:flex-end">
      <label>&nbsp;</label>
      <button class="btn outline" id="reshuffle">🔀 New set</button>
    </div>
  </div>

  <div class="scorebar" id="bar">
    <span id="prog">0 / 0 answered</span>
    <button class="btn" id="submit" style="margin-left:auto">Submit test</button>
  </div>

  <div id="result"></div>
  <div class="cards" id="stage"><div class="spin">Loading quiz…</div></div>
  <p class="foot">Choose an answer for each question, then press <b>Submit test</b> to see your score and the correct answers.</p>
</main>

<script src="js/data.js?v=11"></script>
<script src="js/quiz.js?v=11"></script>
</body>
</html>
