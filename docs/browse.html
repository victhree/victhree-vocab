<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Word Bank — VicThree Vocab</title>
<meta name="theme-color" content="#0B1F3A">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="assets/icon-180.png">
<link rel="icon" href="assets/icon-192.png">
<link rel="stylesheet" href="css/styles.css?v=1">
</head>
<body>
<header class="top"><div class="wrap">
  <a class="brand" href="index.html"><span class="v3">V3</span><span>VicThree Vocab<small>CDS &amp; AFCAT English</small></span></a>
  <nav>
    <a href="index.html">Home</a>
    <a href="quiz.html">Quiz</a>
    <a href="browse.html" class="active">Word Bank</a>
  </nav>
</div></header>

<main class="container">
  <a class="backlink" href="index.html">← Home</a>
  <h2 style="margin:4px 0 14px">Word Bank</h2>

  <div class="toolbar">
    <div class="field" style="grid-column:1/-1">
      <label for="search">Search</label>
      <input id="search" type="search" placeholder="word, meaning, synonym…">
    </div>
    <div class="field">
      <label for="level">Level</label>
      <select id="level">
        <option value="all">All levels</option>
        <option value="easy">Easy</option>
        <option value="moderate">Moderate</option>
        <option value="difficult">Difficult</option>
      </select>
    </div>
    <div class="field">
      <label>&nbsp;</label>
      <button class="chip" id="saved-toggle">★ Bookmarked only</button>
    </div>
  </div>

  <div class="chips" id="kind-chips" style="margin-bottom:14px">
    <button class="chip on" data-k="all">All</button>
    <button class="chip" data-k="word">Words</button>
    <button class="chip" data-k="idiom">Idioms</button>
    <button class="chip" data-k="ows">One-word subs</button>
  </div>

  <div class="meta-row"><span id="count">…</span></div>
  <div class="cards" id="list"><div class="spin">Loading word bank…</div></div>
  <p class="foot">★ saves a word · ⬇ downloads the card as an image · progress badges come from the quiz.</p>
</main>

<script src="js/data.js?v=1"></script>
<script src="js/browse.js?v=1"></script>
</body>
</html>
