<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Word Bank — VicThree Vocab</title>
<meta name="theme-color" content="#0B1F3A">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="assets/shield-180.png?v=47">
<link rel="icon" href="assets/shield-192.png?v=47"><link rel="icon" sizes="32x32" href="assets/shield-32.png?v=47">
<link rel="stylesheet" href="css/styles.css?v=47">
</head>
<body>
<header class="vbanner">
  <a href="index.html"><img class="bimg" src="assets/banner.png?v=47" alt="VicThree Defence"></a>
  <nav class="vbanner-icons">
    <a href="index.html" title="Home" aria-label="Home"><svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11l9-8 9 8"/><path d="M5 10v10h14V10"/></svg></a>
    <a href="browse.html?saved=1" title="Saved words" aria-label="Saved"><svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor"><path d="M12 2.5l2.9 6 6.6.5-5 4.3 1.5 6.4L12 16.9 5.5 20.2 7 13.8 2 9.5l6.6-.5z"/></svg></a>
  </nav>
  <div class="hud-bar"><span class="dot"></span> System Online <span class="sep">&middot;</span> <span class="amber">TARGET:</span> CDS <span class="amber">//</span> AFCAT English <span class="sep">&middot;</span> Ready</div>
</header>

<main class="container">
  <h2 style="margin:4px 0 14px">Word Bank</h2>

  <div class="toolbar">
    <div class="field" style="grid-column:1/-1">
      <label for="search">Search</label>
      <input id="search" type="search" placeholder="word, meaning, synonym…">
    </div>
    <div class="field">
      <label for="level">Level</label>
      <select id="level">
        <option value="all">All levels</option>
        <option value="easy">Easy</option>
        <option value="moderate">Moderate</option>
        <option value="difficult">Difficult</option>
      </select>
    </div>
    <div class="field">
      <label>&nbsp;</label>
      <button class="chip" id="saved-toggle">★ Bookmarked only</button>
    </div>
  </div>

  <div class="chips" id="kind-chips" style="margin-bottom:14px">
    <button class="chip on" data-k="all">All</button>
    <button class="chip" data-k="word">Words</button>
    <button class="chip" data-k="idiom">Idioms</button>
    <button class="chip" data-k="ows">One-word subs</button>
  </div>

  <div class="meta-row"><span id="count">…</span></div>
  <div class="cards" id="list"><div class="spin">Loading word bank…</div></div>
  <p class="foot">★ saves a word &middot; ⬇ downloads the card as an image &middot; progress badges come from the quiz.</p>
</main>

<script src="js/data.js?v=47"></script>
<script src="js/browse.js?v=47"></script>
</body>
</html>
